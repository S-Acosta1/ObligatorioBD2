services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: ticketing-backend
    ports:
      - "5167:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      DatabaseUsers__Usuario__Password: ${DatabaseUsers__Usuario__Password}
      DatabaseUsers__UsuarioLectura__Password: ${DatabaseUsers__UsuarioLectura__Password}
      DatabaseUsers__Funcionario__Password: ${DatabaseUsers__Funcionario__Password}
      DatabaseUsers__Administrador__Password: ${DatabaseUsers__Administrador__Password}
      DatabaseUsers__AdministradorLectura__Password: ${DatabaseUsers__AdministradorLectura__Password}
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: ticketing-frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost:5167
    depends_on:
      - backend
    restart: unless-stopped
